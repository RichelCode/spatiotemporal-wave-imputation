project:
  name: spatiotemporal-wave-imputation
  seed: 0

data:
  window_start: "2021-01-01"
  window_end: "2025-12-31"
  cadence: "1h"
  stations_xml: "data/raw/activestations.xml"

targets:
  primary: ["WVHT"]          # significant wave height (m)
  secondary: ["DPD", "APD"]  # dominant & average wave period (s)

covariates: "all_standard"   # keep all standard met fields as predictors

forecast:
  horizons_hours: [1, 3, 6, 12]

audit:
  coverage_grid: [0.5, 0.6, 0.7, 0.8, 0.9]
  min_years_grid: [2, 3, 4]
  sentinels: [99.0, 999.0, 9999.0]   # NDBC missing-value codes, stripped before counting

graph:
  k_neighbors: 8                       # kNN graph degree (before symmetrization)
  sigma_heuristic: "local_self_tuning"  # σ_i = distance to i's k-th NN; weight = exp(-d^2 / (σ_i·σ_j))
  basin_aware: true                    # also build a variant that zeros cross-basin edges

deep:
  window_hours: 48        # temporal window length W (non-overlapping windows)
  batch_size: 256
  max_epochs: 100
  patience: 10            # early-stopping patience (epochs without val improvement)
  learning_rate: 0.001
  device: auto            # auto -> MPS if available, else CUDA, else CPU
