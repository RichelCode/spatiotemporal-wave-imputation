project:
  name: spatiotemporal-wave-imputation
  seed: 0

data:
  window_start: "2021-01-01"
  window_end: "2025-12-31"
  cadence: "1h"
  stations_xml: "data/raw/activestations.xml"

targets:
  primary: ["WVHT"]          # significant wave height (m)
  secondary: ["DPD", "APD"]  # dominant & average wave period (s)

covariates: "all_standard"   # keep all standard met fields as predictors

forecast:
  horizons_hours: [1, 3, 6, 12]

audit:
  coverage_grid: [0.5, 0.6, 0.7, 0.8, 0.9]
  min_years_grid: [2, 3, 4]
  sentinels: [99.0, 999.0, 9999.0]   # NDBC missing-value codes, stripped before counting

graph:
  k_neighbors: 8                       # kNN graph degree (before symmetrization)
  sigma_heuristic: "local_self_tuning"  # σ_i = distance to i's k-th NN; weight = exp(-d^2 / (σ_i·σ_j))
  basin_aware: true                    # also build a variant that zeros cross-basin edges

energy:
  # Deep-water wave energy flux P = rho*g^2/(64*pi) * Hm0^2 * Te  ->  P ~= 0.49 * H^2 * Te (kW/m),
  # H in metres, Te in seconds (rho=1025 kg/m^3).
  power_coeff_kw: 0.49
  # NDBC reports APD (a mean period), not the energy period Te. Convert Te = alpha * APD.
  # alpha ~ 1.1-1.2 is the standard wave-energy-resource convention. We use Te = 1.12*APD, a
  # period ratio consistent with the empirical Te/T02 values in Cahill & Lewis 2014 ("Wave
  # Period Ratios and the Calculation of Wave Power", METS2014, vtechworks.lib.vt.edu/handle/
  # 10919/49206). NOTE: this treats APD as the average zero-crossing period T02 -- an
  # assumption to confirm, not an established identity. Some spectra reach ~1.35.
  # Comparative results (method rankings, persistence-skill) are INVARIANT to alpha, which scales
  # every method's energy identically; only the absolute kW/m magnitudes depend on it.
  te_apd_alpha: 1.12

deep:
  window_hours: 48        # temporal window length W (non-overlapping windows)
  batch_size: 256
  max_epochs: 50          # capped training budget (early stopping may fire sooner)
  patience: 10            # early-stopping patience (epochs without val improvement)
  learning_rate: 0.001
  device: auto            # auto -> MPS if available, else CUDA, else CPU
  seed: 0                 # torch/numpy seed for reproducible deep-model training
